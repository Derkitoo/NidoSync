document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u003cdiv style=\"font-weight:600; font-size:16px;\"\u003eGlissez vos photos ici\u003c/div\u003e\n        \u003cdiv style=\"font-size:13px; color:#9A8E80; margin-top:4px;\"\u003eou cliquez pour sélectionner · JPG, PNG · max 10\u003c/div\u003e\n      \u003c/label\u003e\n\n      \u003csc-if value=\"{{ hasPhotos }}\" hint-placeholder-val=\"\"\u003e\n        \u003cdiv style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;\"\u003e\n          \u003csc-for list=\"{{ photos }}\" as=\"p\" hint-placeholder-count=\"0\"\u003e\n            \u003cdiv style=\"position:relative; width:76px; height:76px; flex:0 0 auto; border-radius:12px; overflow:hidden; background:#EEE4D3;\"\u003e\n              \u003cdiv style=\"{{ p.bg }}\"\u003e\u003c/div\u003e\n              \u003cbutton onclick=\"{{ p.remove }}\" style=\"position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%; border:0; background:rgba(32,24,15,.78); color:#fff; font-size:13px; line-height:1; cursor:pointer;\"\u003e×\u003c/button\u003e\n            \u003c/div\u003e\n          \u003c/sc-for\u003e\n        \u003c/div\u003e\n      \u003c/sc-if\u003e\n\n      \u003cdiv style=\"display:flex; gap:12px;\"\u003e\n        \u003cbutton onclick=\"{{ analyze }}\" style=\"flex:1; background:#C15F3C; color:#FFF; border:0; text-align:center; font-weight:600; font-size:15px; font-family:inherit; padding:14px; border-radius:13px; cursor:pointer;\"\u003e{{ analyzeLabel }}\u003c/button\u003e\n        \u003cbutton onclick=\"{{ clearAll }}\" style=\"background:#F7F2E9; border:1px solid #EDE3D2; color:#6B5C48; font-weight:600; font-size:15px; font-family:inherit; padding:14px 20px; border-radius:13px; cursor:pointer;\"\u003eEffacer\u003c/button\u003e\n      \u003c/div\u003e\n\n      \u003cdiv style=\"margin-top:22px; padding-top:20px; border-top:1px solid #EEE5D5; display:flex; flex-direction:column; gap:12px;\"\u003e\n        \u003cdiv style=\"display:flex; align-items:center; gap:12px; font-size:14px; color:#6B5C48;\"\u003e\u003cspan style=\"color:#C15F3C;\"\u003e✦\u003c/span\u003eDétection automatique des meubles\u003c/div\u003e\n        \u003cdiv style=\"display:flex; align-items:center; gap:12px; font-size:14px; color:#6B5C48;\"\u003e\u003cspan style=\"color:#C15F3C;\"\u003e✦\u003c/span\u003eEstimation du volume en m³\u003c/div\u003e\n        \u003cdiv style=\"display:flex; align-items:center; gap:12px; font-size:14px; color:#6B5C48;\"\u003e\u003cspan style=\"color:#C15F3C;\"\u003e✦\u003c/span\u003eDevis PDF téléchargeable\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003c!-- RIGHT: results --\u003e\n    \u003cdiv style=\"display:flex; flex-direction:column; gap:20px;\"\u003e\n\n      \u003c!-- IDLE --\u003e\n      \u003csc-if value=\"{{ idle }}\" hint-placeholder-val=\"{{ true }}\"\u003e\n        \u003cdiv style=\"background:#FFFFFF; border:1px solid #EDE3D2; border-radius:24px; padding:48px 30px; text-align:center;\"\u003e\n          \u003cdiv style=\"width:64px; height:64px; border-radius:18px; background:#F6EEDD; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 18px;\"\u003e🏠\u003c/div\u003e\n          \u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:700; font-size:22px; margin-bottom:8px;\"\u003eEn attente de photos\u003c/div\u003e\n          \u003cdiv style=\"font-size:15px; color:#9A8E80; max-width:320px; margin:0 auto;\"\u003eAjoutez 1 à 10 photos de vos pièces, puis lancez l\u0027analyse par l\u0027IA.\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/sc-if\u003e\n\n      \u003c!-- LOADING --\u003e\n      \u003csc-if value=\"{{ loading }}\" hint-placeholder-val=\"\"\u003e\n        \u003cdiv style=\"background:#20180F; border-radius:24px; padding:32px;\"\u003e\n          \u003cdiv style=\"display:flex; align-items:center; gap:14px; margin-bottom:24px;\"\u003e\n            \u003cdiv style=\"width:26px; height:26px; border-radius:50%; border:3px solid #3A2E1F; border-top-color:#E8A24A; animation:nido-spin .8s linear infinite;\"\u003e\u003c/div\u003e\n            \u003cdiv\u003e\u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:700; font-size:20px; color:#F5EFE6;\"\u003eAnalyse en cours…\u003c/div\u003e\u003cdiv style=\"font-size:13px; color:#9A8B76;\"\u003eL\u0027IA examine vos photos\u003c/div\u003e\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:flex; flex-direction:column; gap:6px;\"\u003e\n            \u003csc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"4\"\u003e\n              \u003cdiv style=\"display:flex; align-items:center; gap:12px; padding:8px 0;\"\u003e\n                \u003cdiv style=\"{{ st.dotStyle }}\"\u003e{{ st.dot }}\u003c/div\u003e\n                \u003cdiv style=\"{{ st.txtStyle }}\"\u003e{{ st.label }}\u003c/div\u003e\n              \u003c/div\u003e\n            \u003c/sc-for\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/sc-if\u003e\n\n      \u003c!-- RESULT --\u003e\n      \u003csc-if value=\"{{ hasResult }}\" hint-placeholder-val=\"\"\u003e\n        \u003cdiv style=\"background:#20180F; border-radius:24px; padding:clamp(22px,3vw,32px); display:grid; grid-template-columns:repeat(auto-fit,minmax(min(140px,100%),1fr)); gap:24px; align-items:center;\"\u003e\n          \u003cdiv\u003e\n            \u003cdiv style=\"font-size:13px; color:#9A8B76; margin-bottom:6px;\"\u003eVolume total estimé\u003c/div\u003e\n            \u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:800; font-size:clamp(44px,6vw,64px); line-height:1; color:#E8A24A; letter-spacing:-.03em;\"\u003e{{ rVolume }}\u003cspan style=\"font-size:28px;\"\u003e m³\u003c/span\u003e\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"border-left:1px solid #3A2E1F; padding-left:24px;\"\u003e\u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:800; font-size:34px; color:#F3E6D2;\"\u003e{{ rPieces }}\u003c/div\u003e\u003cdiv style=\"font-size:13px; color:#9A8B76; margin-top:4px;\"\u003ePhotos analysées\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv style=\"border-left:1px solid #3A2E1F; padding-left:24px;\"\u003e\u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:800; font-size:34px; color:#F3E6D2;\"\u003e{{ rNbMeubles }}\u003c/div\u003e\u003cdiv style=\"font-size:13px; color:#9A8B76; margin-top:4px;\"\u003eMeubles détectés\u003c/div\u003e\u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003csc-if value=\"{{ rFallback }}\" hint-placeholder-val=\"\"\u003e\n          \u003cdiv style=\"background:#FBEEE8; border:1px solid #F0D8CC; color:#B0703F; font-size:13px; padding:12px 16px; border-radius:14px;\"\u003e⚠ Résultat de démonstration — la fonction d\u0027analyse n\u0027est pas connectée dans cet aperçu. En ligne, elle utilise vos photos réelles.\u003c/div\u003e\n        \u003c/sc-if\u003e\n\n        \u003cdiv style=\"background:#FFFFFF; border:1px solid #EDE3D2; border-radius:24px; padding:26px;\"\u003e\n          \u003cdiv style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;\"\u003e\n            \u003cdiv style=\"font-weight:600; font-size:16px;\"\u003eMeubles détectés\u003c/div\u003e\n            \u003cdiv style=\"font-size:13px; color:#8A6A3A; background:#F6EEDD; padding:5px 11px; border-radius:999px; font-weight:600;\"\u003e{{ rResume }}\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:flex; flex-direction:column;\"\u003e\n            \u003csc-for list=\"{{ rMeubles }}\" as=\"m\" hint-placeholder-count=\"4\"\u003e\n              \u003cdiv style=\"display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid #F0E8DA;\"\u003e\n                \u003cdiv style=\"width:38px;height:38px;border-radius:10px;background:#F7F2E9;display:flex;align-items:center;justify-content:center;font-size:18px;\"\u003e{{ m.emoji }}\u003c/div\u003e\n                \u003cdiv style=\"flex:1;\"\u003e\u003cdiv style=\"font-weight:600; font-size:15px;\"\u003e{{ m.nom }}\u003c/div\u003e\u003cdiv style=\"font-size:13px; color:#9A8E80;\"\u003e{{ m.qtyLabel }}\u003c/div\u003e\u003c/div\u003e\n                \u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:700; color:#C15F3C;\"\u003e{{ m.volumeStr }}\u003c/div\u003e\n              \u003c/div\u003e\n            \u003c/sc-for\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv style=\"background:#E8A24A; border-radius:24px; padding:28px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:24px;\"\u003e\n          \u003cdiv\u003e\n            \u003cdiv style=\"font-size:13px; color:#5C4620; font-weight:600; margin-bottom:6px;\"\u003eEstimation de déménagement\u003c/div\u003e\n            \u003cdiv style=\"font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:800; font-size:clamp(26px,4vw,40px); color:#20180F; letter-spacing:-.02em; line-height:1;\"\u003e{{ rEstimate }}\u003c/div\u003e\n            \u003cdiv style=\"font-size:13px; color:#5C4620; margin-top:6px;\"\u003eTarifs indicatifs · à affiner selon la distance\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cbutton onclick=\"{{ downloadPdf }}\" style=\"background:#20180F; color:#F3E6D2; border:0; font-family:inherit; font-weight:600; font-size:15px; padding:15px 22px; border-radius:13px; white-space:nowrap; cursor:pointer;\"\u003e📄 Télécharger le devis PDF\u003c/button\u003e\n        \u003c/div\u003e\n      \u003c/sc-if\u003e\n\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003c!-- FOOTER --\u003e\n  \u003cdiv style=\"border-top:1px solid #E7DECF; margin-top:40px;\"\u003e\n    \u003cdiv style=\"max-width:1240px; margin:0 auto; padding:28px clamp(16px,4vw,40px); display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between; font-size:14px; color:#7A6E62;\"\u003e\n      \u003ca href=\"index.html\" style=\"text-decoration:none; font-family:\u0027Bricolage Grotesque\u0027,sans-serif; font-weight:800; font-size:20px; color:#2A211A;\"\u003eNido\u003cspan style=\"color:#C15F3C;\"\u003eSync\u003c/span\u003e\u003c/a\u003e\n      \u003cdiv\u003e© 2026 NidoSync · Paris, France\u003c/div\u003e\n      \u003cdiv style=\"display:flex; gap:20px;\"\u003e\u003cspan\u003eConfidentialité\u003c/span\u003e\u003cspan\u003eMentions légales\u003c/span\u003e\u003cspan\u003eContact\u003c/span\u003e\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n\u003c/div\u003e\n\u003c/x-dc\u003e\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\"\u003e\nclass Component extends DCLogic {\n  state = { photos: [], loading: false, step: 0, result: null, drag: false };\n\n  addFiles = (fileList) =\u003e {\n    const files = [...fileList].filter(f =\u003e f.type \u0026\u0026 f.type.indexOf(\u0027image/\u0027) === 0);\n    const room = 10 - this.state.photos.length;\n    const use = files.slice(0, room);\n    if (!use.length) return;\n    let pending = use.length;\n    const acc = [];\n    const done = () =\u003e { if (--pending === 0 \u0026\u0026 acc.length) this.setState(s =\u003e ({ photos: [...s.photos, ...acc] })); };\n    use.forEach(f =\u003e {\n      const r = new FileReader();\n      r.onload = () =\u003e {\n        const img = new Image();\n        img.onload = () =\u003e {\n          const max = 1280; let w = img.width, h = img.height;\n          const sc = Math.min(1, max / Math.max(w, h)); w = Math.round(w * sc); h = Math.round(h * sc);\n          const c = document.createElement(\u0027canvas\u0027); c.width = w; c.height = h;\n          c.getContext(\u00272d\u0027).drawImage(img, 0, 0, w, h);\n          acc.push({ url: c.toDataURL(\u0027image/jpeg\u0027, 0.85), name: f.name }); done();\n        };\n        img.onerror = done;\n        img.src = r.result;\n      };\n      r.onerror = done;\n      r.readAsDataURL(f);\n    });\n  };\n\n  onInput = (e) =\u003e { this.addFiles(e.target.files); e.target.value = \u0027\u0027; };\n  onDrop = (e) =\u003e { e.preventDefault(); this.setState({ drag: false }); if (e.dataTransfer \u0026\u0026 e.dataTransfer.files) this.addFiles(e.dataTransfer.files); };\n  onDragOver = (e) =\u003e { e.preventDefault(); };\n  onDragLeave = (e) =\u003e { e.preventDefault(); };\n  removePhoto = (i) =\u003e this.setState(s =\u003e ({ photos: s.photos.filter((_, x) =\u003e x !== i) }));\n  clearAll = () =\u003e { if (this._t) clearInterval(this._t); this.setState({ photos: [], result: null, loading: false, step: 0 }); };\n\n  analyze = async () =\u003e {\n    if (!this.state.photos.length || this.state.loading) return;\n    this.setState({ loading: true, result: null, step: 0 });\n    if (this._t) clearInterval(this._t);\n    this._t = setInterval(() =\u003e this.setState(s =\u003e ({ step: Math.min(s.step + 1, 3) })), 850);\n    const images = this.state.photos.map(p =\u003e p.url);\n    let data = null, fallback = false;\n    try {\n      const resp = await fetch(\u0027/.netlify/functions/analyze\u0027, {\n        method: \u0027POST\u0027, headers: { \u0027Content-Type\u0027: \u0027application/json\u0027 }, body: JSON.stringify({ images })\n      });\n      if (!resp.ok) throw new Error(\u0027http \u0027 + resp.status);\n      data = await resp.json();\n      if (!data || !Array.isArray(data.meubles) || !data.meubles.length) throw new Error(\u0027bad payload\u0027);\n    } catch (err) {\n      data = this.fallback(images.length); fallback = true;\n    }\n    if (this._t) clearInterval(this._t);\n    this.setState({ loading: false, step: 3, result: this.build(data, fallback) });\n  };\n\n  fallback = (n) =\u003e {\n    const base = [\n      { nom: \u0027Canapé 3 places\u0027, emoji: \u0027🛋️\u0027, quantite: 1, volume_unitaire: 1.8 },\n      { nom: \u0027Lit double + sommier\u0027, emoji: \u0027🛏️\u0027, quantite: 1, volume_unitaire: 1.4 },\n      { nom: \u0027Armoire 3 portes\u0027, emoji: \u0027🗄️\u0027, quantite: 1, volume_unitaire: 2.0 },\n      { nom: \u0027Table + 6 chaises\u0027, emoji: \u0027🍽️\u0027, quantite: 1, volume_unitaire: 1.5 },\n      { nom: \u0027Réfrigérateur\u0027, emoji: \u0027🧊\u0027, quantite: 1, volume_unitaire: 0.8 },\n      { nom: \u0027Bureau + fauteuil\u0027, emoji: \u0027🪑\u0027, quantite: 1, volume_unitaire: 0.9 },\n      { nom: \u0027Téléviseur + meuble\u0027, emoji: \u0027📺\u0027, quantite: 1, volume_unitaire: 0.6 },\n      { nom: \u0027Cartons standard\u0027, emoji: \u0027📦\u0027, quantite: 12, volume_unitaire: 0.12 }\n    ];\n    const count = Math.max(4, Math.min(base.length, 4 + n));\n    return { meubles: base.slice(0, count), resume: \u0027Estimation de démonstration\u0027 };\n  };\n\n  build = (data, fallback) =\u003e {\n    const meubles = (data.meubles || []).map(m =\u003e {\n      const q = Number(m.quantite) || 1;\n      const vu = Number(m.volume_unitaire) || 0;\n      return { emoji: m.emoji || \u0027📦\u0027, nom: m.nom || \u0027Objet\u0027, quantite: q, vu,\n        qtyLabel: q \u003e 1 ? (\u0027Quantité : \u0027 + q) : \u0027Quantité : 1\u0027,\n        volumeStr: (vu * q).toFixed(1) + \u0027 m³\u0027 };\n    });\n    const total = meubles.reduce((a, m) =\u003e a + m.vu * m.quantite, 0);\n    const nb = meubles.reduce((a, m) =\u003e a + m.quantite, 0);\n    const low = Math.round(total * 37), high = Math.round(total * 52);\n    const fmt = (x) =\u003e x.toLocaleString(\u0027fr-FR\u0027);\n    return {\n      meubles, total,\n      volumeStr: total.toFixed(total \u003c 10 ? 1 : 0),\n      pieces: this.state.photos.length,\n      nbMeubles: nb,\n      estimate: fmt(low) + \u0027 – \u0027 + fmt(high) + \u0027 €\u0027,\n      resume: (fallback ? \u0027Démo\u0027 : (data.resume || \u0027Analyse terminée\u0027)),\n      fallback\n    };\n  };\n\n  downloadPdf = () =\u003e {\n    const r = this.state.result; if (!r) return;\n    const NS = window.jspdf; if (!NS || !NS.jsPDF) { alert(\u0027Génération PDF indisponible.\u0027); return; }\n    const doc = new NS.jsPDF({ unit: \u0027pt\u0027, format: \u0027a4\u0027 });\n    const M = 48; let y = 60;\n    doc.setFont(\u0027helvetica\u0027, \u0027bold\u0027); doc.setFontSize(24); doc.setTextColor(32, 24, 15);\n    doc.text(\u0027NidoSync\u0027, M, y);\n    doc.setFont(\u0027helvetica\u0027, \u0027normal\u0027); doc.setFontSize(11); doc.setTextColor(107, 92, 72);\n    y += 24; doc.text(\u0027Devis de déménagement estimatif\u0027, M, y);\n    y += 15; doc.text(\u0027Date : \u0027 + new Date().toLocaleDateString(\u0027fr-FR\u0027) + \u0027     Photos analysées : \u0027 + r.pieces, M, y);\n    y += 26; doc.setDrawColor(231, 222, 207); doc.line(M, y, 547, y); y += 24;\n    doc.setFont(\u0027helvetica\u0027, \u0027bold\u0027); doc.setFontSize(12); doc.setTextColor(32, 24, 15);\n    doc.text(\u0027Meuble\u0027, M, y); doc.text(\u0027Qté\u0027, 380, y); doc.text(\u0027Volume\u0027, 470, y);\n    y += 8; doc.line(M, y, 547, y); y += 18;\n    doc.setFont(\u0027helvetica\u0027, \u0027normal\u0027); doc.setFontSize(11); doc.setTextColor(42, 33, 26);\n    r.meubles.forEach(m =\u003e {\n      if (y \u003e 760) { doc.addPage(); y = 60; }\n      doc.text(String(m.nom).slice(0, 52), M, y);\n      doc.text(String(m.quantite), 380, y);\n      doc.text(m.volumeStr, 470, y);\n      y += 18;\n    });\n    y += 8; doc.line(M, y, 547, y); y += 26;\n    doc.setFont(\u0027helvetica\u0027, \u0027bold\u0027); doc.setFontSize(13); doc.setTextColor(32, 24, 15);\n    doc.text(\u0027Volume total estimé : \u0027 + r.volumeStr + \u0027 m3\u0027, M, y); y += 24;\n    doc.setTextColor(193, 95, 60); doc.setFontSize(16);\n    doc.text(\u0027Estimation : \u0027 + r.estimate, M, y);\n    y += 30; doc.setFont(\u0027helvetica\u0027, \u0027normal\u0027); doc.setFontSize(9); doc.setTextColor(154, 142, 128);\n    doc.text(\u0027Tarifs indicatifs, a affiner selon la distance et les contraintes d\\\u0027acces. NidoSync - service de mise en relation, 100% gratuit pour le client.\u0027, M, y, { maxWidth: 499 });\n    doc.save(\u0027devis-nidosync.pdf\u0027);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const texts = [\u0027Envoi et lecture des photos\u0027, \u0027Détection des meubles et objets\u0027, \u0027Estimation des volumes unitaires\u0027, \u0027Génération du devis\u0027];\n    const steps = texts.map((label, i) =\u003e {\n      const done = s.step \u003e i, active = s.step === i;\n      return {\n        label,\n        dot: done ? \u0027✓\u0027 : (active ? \u0027●\u0027 : String(i + 1)),\n        dotStyle: \u0027width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\u0027 + (done ? \u0027background:#3E8E5A;color:#fff;\u0027 : active ? \u0027background:#E8A24A;color:#20180F;\u0027 : \u0027background:#3A2E1F;color:#9A8B76;\u0027),\n        txtStyle: \u0027font-size:14px;\u0027 + (done || active ? \u0027color:#F3E6D2;font-weight:600;\u0027 : \u0027color:#9A8B76;\u0027)\n      };\n    });\n    const r = s.result;\n    return {\n      photoLabel: s.photos.length + \u0027 photo\u0027 + (s.photos.length \u003e 1 ? \u0027s\u0027 : \u0027\u0027),\n      hasPhotos: s.photos.length \u003e 0,\n      photos: s.photos.map((p, i) =\u003e ({ url: p.url, bg: \u0027width:100%;height:100%;background-image:url(\"\u0027 + p.url + \u0027\");background-size:cover;background-position:center;\u0027, remove: () =\u003e this.removePhoto(i) })),\n      analyzeLabel: s.loading ? \u0027Analyse en cours…\u0027 : \u0027✨ Analyser avec l\\\u0027IA\u0027,\n      analyze: this.analyze,\n      clearAll: this.clearAll,\n      onInput: this.onInput, onDrop: this.onDrop, onDragOver: this.onDragOver, onDragLeave: this.onDragLeave,\n      idle: !s.loading \u0026\u0026 !r,\n      loading: s.loading,\n      hasResult: !!r \u0026\u0026 !s.loading,\n      steps,\n      rVolume: r ? r.volumeStr : \u00270\u0027,\n
